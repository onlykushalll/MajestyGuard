name: Bug report
description: Report a MajestyGuard defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MajestyGuard. Do not attach biometric data, camera frames, private logs, credentials, or local configuration.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include safe, minimal steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, .NET version, Python version, and whether this involved service/Credential Provider/camera testing.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste only reviewed, non-sensitive logs.
