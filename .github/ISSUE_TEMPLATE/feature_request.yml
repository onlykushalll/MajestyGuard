name: Feature request
description: Suggest a MajestyGuard improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should MajestyGuard do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CV / liveness
        - Windows service
        - Overlay UI
        - Credential Provider
        - Installer / uninstall
        - Documentation
        - Other
  - type: textarea
    id: safety
    attributes:
      label: Security or privacy considerations
      description: Does this affect camera, biometric data, locking, Windows services, or system settings?
